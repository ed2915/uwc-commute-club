services:
  - type: web
    name: uwc-commute-club
    runtime: node
    plan: starter
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATA_DIR
        value: /var/data
    disk:
      name: submissions
      mountPath: /var/data
      sizeGB: 1
